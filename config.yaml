# I Love You Mirror — Configuration
# -----------------------------------

# Operating mode: "live", "fallback", "hybrid"
#   live     — only use live recordings
#   fallback — only use prerecorded fallback clips
#   hybrid   — prefer live, fall back to prerecorded if needed
mode: hybrid

# Wake-word detection backend: "simulate", "vosk", "porcupine"
wake_detector: vosk

# Audio input
audio:
  sample_rate: 16000
  channels: 1
  format: int16
  # Rolling buffer keeps this many seconds before detection
  # Vosk has ~0.5-1s processing delay, so keep extra pre-buffer
  pre_detection_buffer_sec: 4.0
  # Continue recording this many seconds after detection
  post_detection_sec: 2.0
  # Device index — null means system default
  input_device: null
  output_device: null

# Volume / quality thresholds
# Run calibrate.py to find good values for your space
thresholds:
  # RMS below this = intimate / whisper
  intimate_rms: 0.005
  # RMS above this = strong / projected
  strong_rms: 0.02
  # Noise floor — clips with RMS below this are silence / unusable
  # Set very low for quiet lav mics
  noise_floor_rms: 0.0005
  # Clipping ratio above this = distorted
  max_clipping_ratio: 0.05
  # Minimum duration (seconds) to accept a clip
  min_duration_sec: 0.8
  # Maximum duration (seconds)
  max_duration_sec: 5.0

# Quality gate
quality:
  # Minimum quality score (0-1) to persist a clip into memory
  save_threshold: 0.4
  # Below this score the clip is unusable — use fallback
  unusable_threshold: 0.15

# Memory store
memory:
  max_clips: 1000
  live_dir: audio/live/i_love_you
  live_dir_too: audio/live/i_love_you_too
  fallback_dir: audio/fallback/i_love_you
  fallback_dir_too: audio/fallback/i_love_you_too
  state_file: state.json

# Playback / effects
playback:
  # Layered response: max clips to layer
  max_layers: 8
  # Base delay between layers (seconds) — scaled by golden ratio per layer
  layer_delay_sec: 0.35
  # Volume decay per layer (multiplier, newest=1.0)
  # Steeper decay — volume indicates age/distance
  layer_volume_decay: 0.65
  # Pitch detuning per layer (cents, alternating +/-)
  detune_cents: 7.0
  # Low-pass rolloff: oldest layer cutoff (Hz) — simulates distance
  lp_oldest_hz: 3500
  # Low-pass rolloff: newest layer cutoff (Hz) — stays bright
  lp_newest_hz: 8000
  # Transient softening on older layers (ms fade on attack)
  transient_soften_ms: 20
  # Fade in/out duration (seconds)
  fade_in_sec: 0.1
  fade_out_sec: 0.3
  # Shared reverb on the final mix (not per-layer)
  reverb_enabled: true
  reverb_decay: 0.3
  reverb_delay_ms: 60

# WLED
wled:
  host: "http://192.168.0.11"
  timeout_sec: 2
  presets:
    idle: 1
    wake_neutral: 2
    intimate_low_volume: 3
    layered_high_volume: 4
    reject_or_unclear: 5
    fade_out: 6
  reactive:
    bri_min: 20
    bri_max: 255
    update_hz: 12

# Vosk (used when wake_detector: vosk)
vosk:
  model_path: "models/vosk-model-small-en-us-0.15"
  cooldown_sec: 3.0

# Porcupine (used when wake_detector: porcupine)
porcupine:
  access_key: ""
  keyword_path: ""
  model_path: ""
  sensitivity: 0.5

# Exciter / transducer conditioning
# Enable to clean up audio output through surface transducers
exciter:
  enabled: true
  # High-pass: cut bass the exciter can't reproduce (Hz)
  highpass_hz: 180
  # Notch filter at resonant frequencies of the surface (Hz)
  # Sweep a sine tone and listen for ringing to find your values
  notch_hz: [1200]
  # Notch Q factor (higher = narrower notch)
  notch_q: 10
  # Low-pass to tame harsh highs (Hz)
  lowpass_hz: 7000
  # Soft limiter threshold (0-1) — prevents exciter distortion at peaks
  limiter_threshold: 0.7

# Logging
logging:
  level: INFO
  file: logs/mirror.log

# Dry-run / test mode
test_mode: false
